<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vando Motos | ERP System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brand: { dark: '#0f172a', main: '#f5b041', hover: '#d68910', light: '#fdf8f0' } }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body class="bg-gray-50 text-gray-800 h-screen flex overflow-hidden antialiased">

    <aside class="w-64 bg-brand-dark flex flex-col shrink-0 text-white shadow-xl z-20">
        <div class="h-16 flex items-center px-6 border-b border-gray-800 bg-black/20">
            <div class="w-8 h-8 bg-brand-main rounded flex items-center justify-center font-bold text-brand-dark mr-3">V</div>
            <div>
                <h1 class="font-bold tracking-wide text-sm">VANDO <span class="text-brand-main">MOTOS</span></h1>
                <p class="text-[10px] text-gray-400 uppercase tracking-widest">ERP Enterprise</p>
            </div>
        </div>
        
        <nav class="p-4 space-y-1 flex-1" id="main-menu">
            </nav>
        
        <div class="p-4 border-t border-gray-800 text-xs text-gray-400 text-center">
            Versão 1.0.0
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8 shrink-0 z-10 shadow-sm">
            <h2 id="page-title" class="text-lg font-bold text-gray-800">Carregando...</h2>
            <div class="flex items-center gap-3">
                <span class="text-sm font-medium text-gray-600" id="current-date"></span>
                <div class="w-8 h-8 rounded-full bg-brand-light border border-brand-main text-brand-main flex items-center justify-center font-bold text-sm">IM</div>
            </div>
        </header>

        <div class="flex-1 overflow-auto p-8 relative" id="app-content">
            </div>
    </main>

    <script type="module" src="./src/app.js"></script>
</body>
</html>
