<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vando Motos | ERP Enterprise</title>
    <!-- Fontes e Ícones -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Tailwind CSS Engine -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { 
                        brand: { 
                            dark: '#0a0a0a',      // Preto absoluto da logo
                            darker: '#000000',    // Fundo do menu
                            main: '#facc15',      // Amarelo vibrante da logo
                            hover: '#eab308',     // Amarelo fechado para botões
                            light: '#fefce8'      // Fundo sutil
                        } 
                    },
                    // O "Hack" Enterprise: Força todas as bordas a serem quase retas (2px) ou totalmente quadradas
                    borderRadius: {
                        'none': '0px',
                        'sm': '0px',
                        DEFAULT: '2px',
                        'md': '2px',
                        'lg': '2px',
                        'xl': '2px',
                        '2xl': '2px',
                        '3xl': '2px',
                        'full': '9999px' // Mantém apenas para avatares redondos
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'hard': '4px 4px 0px 0px rgba(0, 0, 0, 0.9)' // Sombra agressiva de design moderno
                    }
                }
            }
        }
    </script>
    <!-- CSS Customizado -->
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body class="bg-gray-100 text-gray-900 h-screen flex overflow-hidden antialiased selection:bg-brand-main selection:text-black">

    <!-- BARRA LATERAL (SIDEBAR PREMIUM) -->
    <aside class="w-64 bg-brand-darker flex flex-col shrink-0 text-white border-r border-gray-800 z-20 relative">
        <!-- Logo Area Atualizada e Ampliada -->
        <div class="py-8 px-6 flex items-center justify-center border-b border-gray-900 bg-brand-dark">
            <img src="./assets/img/logo.png" alt="Vando Motos Logo" class="w-full h-auto object-contain drop-shadow-lg transform hover:scale-105 transition-transform duration-300">
        </div>
        
        <!-- Menu de Navegação -->
        <nav class="p-5 space-y-1.5 flex-1 overflow-y-auto custom-scroll" id="main-menu">
            <!-- Gerado via JS -->
        </nav>
        
        <!-- Footer do Menu -->
        <div class="p-5 border-t border-gray-900 bg-brand-dark text-xs flex justify-between items-center">
            <span class="text-gray-500 font-mono tracking-widest uppercase">ERP Core v2.0</span>
            <div class="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.8)]" title="Sistema Online"></div>
        </div>
    </aside>

    <!-- ÁREA PRINCIPAL -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-gray-50 relative">
        
        <!-- CABEÇALHO SUPERIOR -->
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8 shrink-0 z-10 shadow-sm backdrop-blur-md bg-white/90">
            <h2 id="page-title" class="text-lg font-extrabold text-gray-900 uppercase tracking-tight">Carregando Módulos...</h2>
            
            <div class="flex items-center gap-5">
                <div class="text-right hidden md:block">
                    <p class="text-sm font-bold text-gray-800 leading-none">Operação Local</p>
                    <span class="text-xs text-gray-500 font-medium" id="current-date"></span>
                </div>
                <div class="w-10 h-10 bg-brand-dark text-brand-main flex items-center justify-center font-black text-sm border-2 border-brand-main shadow-sm">
                    VM
                </div>
            </div>
        </header>

        <!-- CONTEÚDO DINÂMICO (VIEWS) -->
        <div class="flex-1 overflow-auto p-6 md:p-10 relative custom-scroll" id="app-content">
            <!-- app.js injeta aqui -->
        </div>
    </main>

    <!-- Importação do App -->
    <script type="module" src="./src/app.js"></script>
</body>
</html>
